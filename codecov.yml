codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "40...100"
  
  status:
    project:
      default:
        # Realistic Community Edition floor; raise as Physics/Aerospace coverage grows.
        target: 40%
        threshold: 2%
        base: auto
    patch:
      default:
        target: 50%
        threshold: 5%
        base: auto

comment:
  layout: "reach,diff,flags,tree,reach"
  behavior: default
  require_changes: no

github_checks:
  annotations: true

flags:
  unittests:
    paths:
      - Tests/Unit/
    carryforward: true
  integration:
    paths:
      - Tests/Integration/
    carryforward: true
