name: Feature Request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. For small fixes, consider opening a PR directly — see [CONTRIBUTING.md](../../CONTRIBUTING.md).

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem does this solve, or what workflow would improve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web API
        - Physics / simulation
        - Certification
        - AI / optimization
        - Documentation
        - CI/CD / DevOps
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this
        - label: I agree to follow the project's [Code of Conduct](../../CODE_OF_CONDUCT.md)
          required: true
