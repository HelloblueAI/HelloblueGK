name: Bug Report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve HelloblueGK. Please search [existing issues](https://github.com/HelloblueAI/HelloblueGK/issues) first.

        **Do not report security vulnerabilities here.** See [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands, endpoints, or UI steps we can follow.
      placeholder: |
        1. cd WebAPI
        2. dotnet run
        3. curl http://localhost:5000/...
    validations:
      required: true

  - type: input
    id: dotnet
    attributes:
      label: .NET SDK version
      placeholder: "9.0.x"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Contribution guidelines
      options:
        - label: I agree to follow the project's [Code of Conduct](../../CODE_OF_CONDUCT.md)
          required: true
