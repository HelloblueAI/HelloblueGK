name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, production-deployment, 'fix/**' ]
  pull_request:
    branches: [ main, develop, production-deployment ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Restore test project dependencies
      run: dotnet restore Tests/HelloblueGK.Tests.csproj
      
    - name: Build solution
      run: dotnet build --no-restore --configuration Release
      
    - name: Build test project
      run: dotnet build Tests/HelloblueGK.Tests.csproj --no-restore --configuration Release
      
    - name: Run unit tests
      run: dotnet test Tests/HelloblueGK.Tests.csproj --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory:"${{ github.workspace }}/TestResults" --no-build --logger "console;verbosity=normal"
      timeout-minutes: 15
      
    - name: Generate coverage report
      if: always()
      run: |
        dotnet tool install -g dotnet-reportgenerator-globaltool || true
        if [ -d "${{ github.workspace }}/TestResults" ] && find "${{ github.workspace }}/TestResults" -name "coverage.cobertura.xml" | grep -q .; then
          reportgenerator -reports:"${{ github.workspace }}/TestResults/**/coverage.cobertura.xml" -targetdir:"${{ github.workspace }}/CoverageReport" -reporttypes:"Html;Badges;JsonSummary"
        else
          echo "No coverage files found, skipping report generation"
        fi
        
    - name: Upload coverage reports
      if: always()
      uses: codecov/codecov-action@v7
      with:
        files: ${{ github.workspace }}/TestResults/**/coverage.cobertura.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: ${{ github.workspace }}/TestResults
        retention-days: 30
        
    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: ${{ github.workspace }}/CoverageReport
        retention-days: 30

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build solution
      run: dotnet build --no-restore --configuration Release
      
    - name: Run integration tests
      run: dotnet test Tests/HelloblueGK.Tests.csproj --configuration Release --no-build --filter "Category=Integration" --verbosity minimal --logger "console;verbosity=minimal"
      
    - name: Run performance benchmarks
      run: dotnet test Tests/HelloblueGK.Tests.csproj --configuration Release --no-build --filter "Category=Performance" --verbosity minimal --logger "console;verbosity=minimal"

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    # Soft until a dedicated format PR lands; restore/format OOMs on some local hosts.
    - name: Check code formatting
      run: dotnet format --verify-no-changes --verbosity minimal
      continue-on-error: true
      
    - name: Run code analysis
      run: >
        dotnet build --no-restore --configuration Release
        /p:RunAnalyzers=true
        /p:AnalysisLevel=latest
        /p:EnforceCodeStyleInBuild=true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: |
        dotnet restore HelloblueGK.csproj
        dotnet restore WebAPI/HelloblueGK.WebAPI.csproj
        dotnet restore Tests/HelloblueGK.Tests.csproj

    - name: Fail on vulnerable NuGet packages
      run: |
        chmod +x .github/scripts/fail-on-vulnerable-packages.sh
        .github/scripts/fail-on-vulnerable-packages.sh
      
    - name: Report deprecated packages
      run: |
        dotnet list HelloblueGK.csproj package --deprecated
        dotnet list WebAPI/HelloblueGK.WebAPI.csproj package --deprecated
        dotnet list Tests/HelloblueGK.Tests.csproj package --deprecated

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      
    - name: Build Docker image
      env:
        DOCKER_BUILDKIT: 1
      run: docker build -f ./Docker/Dockerfile -t hellobluegk:test .

  publish-status:
    name: Publish Status
    runs-on: ubuntu-latest
    needs: [build, integration-tests, code-quality, security-scan]
    if: always()
    
    steps:
    - name: Check overall status
      run: |
        echo "CI/CD checks completed"
        echo "Build: ${{ needs.build.result }}"
        echo "Integration Tests: ${{ needs.integration-tests.result }}"
        echo "Code Quality: ${{ needs.code-quality.result }}"
        echo "Security Scan: ${{ needs.security-scan.result }}"
        if [ "${{ needs.build.result }}" != "success" ] || \
           [ "${{ needs.integration-tests.result }}" != "success" ] || \
           [ "${{ needs.code-quality.result }}" != "success" ] || \
           [ "${{ needs.security-scan.result }}" != "success" ]; then
          echo "One or more required jobs failed"
          exit 1
        fi
