name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
    
    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'
    
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Build PlasticityDemo
      run: |
        cd PlasticityDemo
        dotnet build --configuration Release
        dotnet publish --configuration Release --output ./publish
    
    - name: Generate design files
      run: |
        python3 open_in_plasticity.py
    
    - name: Create release package
      run: |
        mkdir -p release
        cp -r PlasticityDemo/publish/* release/
        cp HB-NLP-REV-001* release/
        cp open_in_plasticity.py release/
        cp README.md release/
        cp LICENSE release/
        
        # Create zip archive
        zip -r hellobluegk-release-${{ github.ref_name }}.zip release/
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: HelloblueGK Community Edition ${{ github.ref_name }}
        body: |
          ## HelloblueGK Community Edition ${{ github.ref_name }}

          Open-source aerospace engine simulation reference stack (.NET 9).

          This release is the **Community Edition** — useful for research, integration,
          and education. It is **not** a flight-certified or mission-ready package.
          See [OPEN_SOURCE_SCOPE.md](https://github.com/HelloblueAI/HelloblueGK/blob/main/OPEN_SOURCE_SCOPE.md).

          ### Included
          - PlasticityDemo publish output
          - Sample engine design files / scripts
          - README and Apache 2.0 license

          ### Quick start
          ```bash
          unzip hellobluegk-release-${{ github.ref_name }}.zip
          cd release
          dotnet PlasticityDemo.dll
          ```

          For production/enterprise needs, contact Helloblue — do not treat this
          repository alone as regulatory or flight evidence.
        draft: false
        prerelease: false
    
    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./hellobluegk-release-${{ github.ref_name }}.zip
        asset_name: hellobluegk-release-${{ github.ref_name }}.zip
        asset_content_type: application/zip 